<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Jesse Coggins</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0d1512" />

    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />

    <style>
      .not-found {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        position: relative;
        z-index: 2;
        padding: 40px 32px;
      }
      .not-found-inner { max-width: 560px; }
      .not-found-code {
        font-family: 'Instrument Serif', serif;
        font-size: clamp(6rem, 20vw, 12rem);
        line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #c9b687 0%, #8aa884 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 24px;
      }
      .not-found-title {
        font-family: 'Instrument Serif', serif;
        font-size: clamp(1.6rem, 4vw, 2.4rem);
        font-weight: 400;
        color: #f0ead8;
        letter-spacing: -0.02em;
        margin-bottom: 16px;
      }
      .not-found-copy {
        font-size: 16px;
        color: #b8b09a;
        line-height: 1.7;
        margin-bottom: 40px;
      }
    </style>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="gradient-orb orb-1" aria-hidden="true"></div>
    <div class="gradient-orb orb-2" aria-hidden="true"></div>

    <div class="not-found">
      <div class="not-found-inner">
        <div class="not-found-code">404</div>
        <h1 class="not-found-title">Page not found</h1>
        <p class="not-found-copy">This page doesn't exist or may have moved. Head back to the portfolio.</p>
        <a class="button button-primary" href="/">
          <span>Back to portfolio</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </a>
      </div>
    </div>
  </body>
</html>
